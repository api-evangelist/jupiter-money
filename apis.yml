aid: jupiter-money
name: Jupiter Money
description: >-
  Jupiter Money is a Bengaluru-based Indian digital banking app (neobank)
  operated by Amica Financial Technologies Private Limited. Founded in 2019
  by Jitendra Gupta, Jupiter delivers a consumer "money app" experience that
  bundles savings and salary accounts, UPI payments, co-branded credit cards,
  personal loans, mutual funds, digital gold, fixed and recurring deposits,
  insurance, and a Jewels rewards program into a single mobile application.
  Jupiter is itself not a bank — it operates as a fintech marketplace and
  Loan Service Provider on top of regulated partners. Federal Bank is the
  primary banking partner for savings, salary, and deposit products, with
  CSB Bank powering the Edge+ and Edge RuPay credit cards and Federal Bank
  the Edge Federal VISA card. Lending is provided through partners including
  Amica Finance Private Limited and Kisetsu Saison Finance, with mutual funds
  through AIAPL and digital gold through MMTC-PAMP. The product is consumer
  facing and distributed via the Android and iOS apps; Jupiter does not
  publish a public developer API, SDK, OpenAPI specification, or developer
  portal. All integrations with banks, NBFCs, NPCI/UPI rails, card networks,
  and depositories are private business-to-business arrangements rather
  than an open API program.
